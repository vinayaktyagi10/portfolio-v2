name: Update Public Stats
permissions:
  contents: write
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Fetch stats from API
        run: |
          curl -s \
            -H "X-API-Key: ${{ secrets.API_KEY }}" \
            "${{ secrets.API_URL }}/api/stats" \
            -o stats.json
      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --cached --quiet || git commit -m "chore: update public stats [skip ci]"
          git push
