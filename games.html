  <!-- HERO -->
  <header class="games-hero section-container">
    <div class="games-hero-blob"></div>
    <div class="badge" style="margin-bottom: 24px;">The Shelf</div>
    <h1 class="games-title">Worlds I've <span>explored.</span></h1>
    <p class="games-subtitle">
      A curated shelf of games I've beaten, 100% completed, or got completely lost in. Built with systems-heavy sandboxes, immersive RPGs, and visual masterpieces.
    </p>
  </header>

  <!-- MAIN CATALOG -->
  <main class="section-container" style="padding-top: 0;">
    <!-- Search & Filter Controls -->
    <div class="controls-bar">
      <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="game-search" class="search-input" placeholder="Search by title, review, verdict...">
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All Games</button>
        <button class="filter-btn" data-filter="masterpiece">Masterpieces</button>
        <button class="filter-btn" data-filter="playing">Playing</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
    </div>

    <!-- Games Grid -->
    <div id="games-grid" class="games-grid">
      <!-- Generated dynamically by games.js -->
    </div>
